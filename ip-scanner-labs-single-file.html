<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IP Scanner Labs</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
/* ==========================================================================
   IP Scanner Labs — Stylesheet
   ========================================================================== */

:root {
  --bg:       #0a0c10;
  --surface:  #0f1318;
  --border:   #1e2530;
  --accent:   #00d4aa;
  --accent2:  #0088ff;
  --warn:     #ff6b35;
  --success:  #00d4aa;
  --fail:     #ff3f5b;
  --text:     #c8d0dc;
  --muted:    #4a5568;
  --terminal-bg: #060810;
  --mono:     'IBM Plex Mono', monospace;
  --sans:     'Vazirmatn', sans-serif;
}

@media (prefers-color-scheme: light) {
  :root {
    --bg:          #f4f3fb;
    --surface:     #ffffff;
    --border:      #e6e3f5;
    --accent:      #7c3aed;
    --accent2:     #2563eb;
    --warn:        #db2777;
    --success:     #16a34a;
    --fail:        #e11d48;
    --text:        #1e1b2e;
    --muted:       #8884a3;
    --terminal-bg: #1a1730;
    --grad: linear-gradient(135deg, #7c3aed 0%, #2563eb 55%, #db2777 100%);
  }
  body {
    background-image:
      radial-gradient(circle at 8% 8%, rgba(124,58,237,.10) 0%, transparent 45%),
      radial-gradient(circle at 95% 12%, rgba(37,99,235,.09) 0%, transparent 40%),
      radial-gradient(circle at 50% 100%, rgba(219,39,119,.07) 0%, transparent 50%),
      var(--bg);
    background-attachment: fixed;
  }
  .card { box-shadow: 0 2px 10px rgba(76,29,149,.06), 0 1px 3px rgba(76,29,149,.04); }
  .header-icon {
    background: var(--grad);
    border: none;
    color: #fff;
    box-shadow: 0 4px 14px rgba(124,58,237,.35);
  }
  .header h1 {
    background: var(--grad);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .header h1 .sub-brand { -webkit-text-fill-color: initial; color: var(--accent2); }
  input, select { background: #fbfaff; }
  input:focus, select:focus { box-shadow: 0 0 0 3px rgba(124,58,237,.12); }
  .terminal { box-shadow: inset 0 1px 6px rgba(30,10,60,.35); }
  .btn-scan {
    background: var(--grad);
    border: none;
    color: #fff;
    box-shadow: 0 4px 16px rgba(124,58,237,.3);
  }
  .btn-scan:hover { box-shadow: 0 6px 20px rgba(124,58,237,.42); transform: translateY(-1px); }
  .progress-bar-fill { background: var(--grad); }
  .pill.active {
    background: var(--grad);
    border: none;
    color: #fff;
  }
  .badge-ok { background: rgba(22,163,74,.1); }
  .badge-fail { background: rgba(225,29,72,.08); }
  .toolbar-row .chip.active { background: var(--grad); border: none; color: #fff; }
  .toolbar-row .chip.toggle-on { background: rgba(37,99,235,.1); }
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  padding: 24px;
}

/* ── header ── */
.header {
  border-bottom: 1px solid var(--border);
  padding-bottom: 20px;
  margin-bottom: 28px;
  display: flex;
  align-items: center;
  gap: 14px;
}
.header-icon {
  width: 42px; height: 42px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #fff;
  flex-shrink: 0;
  box-shadow: 0 3px 10px rgba(0,0,0,.18);
}
.header h1 {
  font-family: var(--mono);
  font-size: 1.25rem;
  color: var(--accent);
  letter-spacing: 0.05em;
}
.header h1 .sub-brand {
  color: var(--accent2);
  font-weight: 400;
}
.header p {
  font-size: 0.78rem;
  color: var(--muted);
  margin-top: 3px;
  font-family: var(--mono);
}

/* ── language switcher ── */
.lang-switch {
  position: relative;
  margin-inline-start: auto;
  flex-shrink: 0;
}
.lang-trigger {
  width: 38px; height: 38px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--muted);
  cursor: pointer;
  transition: all .15s;
}
.lang-trigger:hover, .lang-trigger.open {
  border-color: var(--accent);
  color: var(--accent);
}
.lang-menu {
  position: absolute;
  top: calc(100% + 6px);
  inset-inline-end: 0;
  display: none;
  flex-direction: column;
  gap: 2px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 4px;
  box-shadow: 0 6px 18px rgba(0,0,0,.25);
  z-index: 20;
  min-width: 110px;
}
.lang-menu.open { display: flex; }
.lang-menu button {
  font-family: var(--mono);
  font-size: 0.78rem;
  padding: 8px 12px;
  border-radius: 6px;
  border: none;
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  text-align: start;
  transition: all .15s;
  white-space: nowrap;
}
.lang-menu button.active {
  background: var(--accent);
  color: #fff;
}
.lang-menu button:not(.active):hover {
  background: var(--bg);
  color: var(--text);
}

/* ── responsible-use notice ── */
.usage-notice {
  background: rgba(255,107,53,.08);
  border: 1px solid rgba(255,107,53,.3);
  border-radius: 8px;
  padding: 11px 16px;
  font-size: 0.78rem;
  color: var(--warn);
  font-family: var(--sans);
  line-height: 1.7;
  margin-bottom: 24px;
}

/* ── card ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 22px 22px 24px;
  margin-bottom: 24px;
}
.card-title {
  font-family: var(--mono);
  font-size: 0.72rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 18px;
}

/* ── form ── */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
@media(max-width:600px){ .grid-2 { grid-template-columns: 1fr; } }

.field-group { margin-bottom: 20px; }
.field-group.wide { margin-bottom: 22px; }

label {
  display: block;
  font-size: 0.8rem;
  color: var(--muted);
  margin-bottom: 6px;
  font-family: var(--mono);
}
input, select {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-family: var(--mono);
  font-size: 0.88rem;
  padding: 9px 12px;
  outline: none;
  transition: border-color .2s;
  direction: ltr;
}
input:focus, select:focus { border-color: var(--accent); }
input::placeholder { color: var(--muted); }
select option { background: var(--surface); }

/* method pills */
.pill-group { display: flex; gap: 8px; flex-wrap: wrap; }
.pill {
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  font-family: var(--mono);
  font-size: 0.78rem;
  cursor: pointer;
  color: var(--muted);
  background: transparent;
  transition: all .2s;
  user-select: none;
}
.pill.active {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(0,212,170,.08);
}
.pill:not(.active):hover {
  border-color: var(--muted);
  color: var(--text);
}

/* port tags */
.port-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
.tag {
  padding: 4px 10px;
  border-radius: 4px;
  font-family: var(--mono);
  font-size: 0.75rem;
  cursor: pointer;
  border: 1px solid var(--border);
  color: var(--muted);
  background: transparent;
  transition: all .15s;
}
.tag.sel {
  border-color: var(--accent2);
  color: var(--accent2);
  background: rgba(0,136,255,.1);
}
.tag:not(.sel):hover {
  border-color: var(--muted);
  color: var(--text);
}

/* scan / stop buttons */
.btn-row { display: flex; gap: 8px; }
.btn-scan {
  flex: 1;
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: none;
  background: linear-gradient(135deg, #00d4aa22, #0088ff22);
  border: 1px solid var(--accent);
  color: var(--accent);
  font-family: var(--mono);
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  letter-spacing: 0.06em;
  transition: all .2s;
  margin-top: 4px;
}
.btn-scan:hover { background: linear-gradient(135deg,#00d4aa33,#0088ff33); }
.btn-scan:disabled { opacity: .45; cursor: not-allowed; }

.btn-stop {
  padding: 12px 18px;
  border-radius: 8px;
  border: 1px solid var(--fail);
  background: rgba(255,63,91,.08);
  color: var(--fail);
  font-family: var(--mono);
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  transition: all .2s;
  flex-shrink: 0;
}
.btn-stop:hover { background: rgba(255,63,91,.16); }

/* ── progress ── */
.progress-bar-wrap {
  background: var(--bg);
  border-radius: 4px;
  height: 5px;
  overflow: hidden;
  margin-bottom: 12px;
}
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 4px;
  transition: width .15s linear;
  width: 0%;
}
.progress-text {
  font-family: var(--mono);
  font-size: 0.78rem;
  color: var(--text);
  margin-bottom: 10px;
}
.progress-text .hl { color: var(--accent2); font-weight: 600; }

/* ── stats row ── */
.stats { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 14px; }
.stat {
  flex: 1; min-width: 100px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 14px;
  text-align: center;
}
.stat-val { font-family: var(--mono); font-size: 1.5rem; font-weight: 600; }
.stat-label { font-size: 0.7rem; color: var(--muted); margin-top: 2px; font-family: var(--mono); }
.c-green { color: var(--success); }
.c-red   { color: var(--fail); }
.c-blue  { color: var(--accent2); }
.c-warn  { color: var(--warn); }

/* ── log / terminal ── */
.terminal {
  background: var(--terminal-bg);
  color: #c8d0dc;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px 16px;
  font-family: var(--mono);
  font-size: 0.78rem;
  max-height: 340px;
  overflow-y: auto;
  line-height: 1.7;
}
.terminal::-webkit-scrollbar { width: 4px; }
.terminal::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.log-line { display: flex; gap: 10px; align-items: baseline; }
.log-time { color: var(--muted); flex-shrink: 0; font-size: 0.72rem; }
.log-ok   { color: var(--success); }
.log-fail { color: var(--fail); }
.log-info { color: var(--accent2); }
.log-warn { color: var(--warn); }

/* ── filter / sort toolbar ── */
.toolbar-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 9px;
}
.toolbar-row:last-child { margin-bottom: 0; }
.toolbar-row .chip {
  flex: 1 1 auto;
  text-align: center;
  padding: 7px 10px;
  border-radius: 6px;
  border: 1px solid var(--border);
  font-family: var(--mono);
  font-size: 0.74rem;
  cursor: pointer;
  color: var(--muted);
  background: transparent;
  transition: all .15s;
  user-select: none;
  white-space: nowrap;
}
.toolbar-row .chip.active {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(0,212,170,.08);
}
.toolbar-row .chip.toggle-on {
  border-color: var(--accent2);
  color: var(--accent2);
  background: rgba(0,136,255,.1);
}
.toolbar-row .chip:not(.active):not(.toggle-on):hover {
  border-color: var(--muted);
  color: var(--text);
}
.toolbar-wrap {
  margin-bottom: 20px;
}
.toolbar-label {
  font-family: var(--mono);
  font-size: 0.66rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 5px;
}

/* ── results table ── */
.results-wrap {
  overflow-x: auto;
  overflow-y: auto;
  max-height: 420px;
}
.results-wrap::-webkit-scrollbar { width: 4px; }
.results-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
table {
  width: 100%;
  border-collapse: collapse;
  font-family: var(--mono);
  font-size: 0.8rem;
}
th {
  text-align: right;
  padding: 8px 12px;
  color: var(--muted);
  font-size: 0.7rem;
  letter-spacing: 0.08em;
  border-bottom: 1px solid var(--border);
  font-weight: 400;
  position: sticky;
  top: 0;
  background: var(--surface);
  z-index: 1;
}
td {
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  color: var(--text);
}
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(255,255,255,.02); }

.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 0.7rem;
}
.badge-ok   { background: rgba(0,212,170,.12); color: var(--success); border: 1px solid rgba(0,212,170,.3); }
.badge-fail { background: rgba(255,63,91,.1);  color: var(--fail);    border: 1px solid rgba(255,63,91,.3); }

.row-num { color: var(--muted); width: 36px; }
.ip-cell { color: var(--accent); direction: ltr; }
.ip-copy { cursor: pointer; transition: color .15s; }
.ip-copy:hover { color: var(--accent2); text-decoration: underline; }
.port-cell { color: var(--accent2); }
.latency-cell { color: var(--warn); }

.detail-col { display: none; }
.detail-col.show { display: table-cell; }

/* export */
.btn-export {
  padding: 7px 16px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-family: var(--mono);
  font-size: 0.75rem;
  cursor: pointer;
  transition: all .2s;
}
.btn-export:hover { border-color: var(--accent2); color: var(--accent2); }

.flex-between { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }

.empty-state {
  text-align: center;
  padding: 32px;
  color: var(--muted);
  font-family: var(--mono);
  font-size: 0.8rem;
}
.empty-state .icon { font-size: 2rem; margin-bottom: 8px; }

/* ── footer ── */
.footer {
  text-align: center;
  padding: 20px 0 8px;
  font-family: var(--mono);
  font-size: 0.72rem;
  color: var(--muted);
  letter-spacing: 0.04em;
}

/* ── desktop layout: settings left, results/log right ── */
.main-layout {
  display: block;
}

/* welcome/guide card — pre-scan empty state for the right column */
.welcome-steps {
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.welcome-step {
  display: flex;
  gap: 14px;
  align-items: flex-start;
}
.welcome-step-num {
  flex-shrink: 0;
  font-family: var(--mono);
  font-size: 1.4rem;
  font-weight: 600;
  color: var(--border);
  line-height: 1;
  width: 36px;
}
.welcome-step-text {
  font-size: 0.82rem;
  color: var(--muted);
  line-height: 1.7;
  padding-top: 2px;
}

@media (min-width: 900px) {
  .main-layout {
    display: grid;
    grid-template-columns: 380px 1fr;
    gap: 24px;
    align-items: start;
  }
  .col-config { position: sticky; top: 20px; }
  .col-results { display: flex; flex-direction: column; min-width: 0; }

  /* notice and any other full-bleed elements span both columns */
  .layout-span { grid-column: 1 / -1; }

  /* compact, content-sized toolbar buttons instead of full-width stretch */
  .toolbar-row .chip { flex: 0 1 auto; padding: 7px 16px; }
  .preset-card-controls .preset-btn { flex: 0 1 auto; padding: 7px 22px; }

  /* slightly larger type on desktop, where reading distance is greater */
  table { font-size: 0.85rem; }
  .terminal { font-size: 0.82rem; }
  .results-wrap { max-height: 480px; }

  /* welcome card more spacious on desktop */
  .welcome-step-num { font-size: 1.8rem; width: 44px; }
  .welcome-step-text { font-size: 0.86rem; }
}
@media (min-width: 1300px) {
  .main-layout {
    grid-template-columns: 400px 1fr;
    gap: 32px;
  }
}

/* method note */
.method-note {
  background: rgba(0,136,255,.07);
  border: 1px solid rgba(0,136,255,.2);
  border-radius: 6px;
  padding: 10px 14px;
  font-size: 0.75rem;
  color: #6cb3ff;
  font-family: var(--mono);
  margin-top: 10px;
  line-height: 1.6;
}

/* range helper */
.range-info {
  font-family: var(--mono);
  font-size: 0.7rem;
  color: var(--muted);
  margin-top: 5px;
}

/* ── Cloudflare clean-IP preset ── */
.preset-card {
  display: flex;
  gap: 12px;
  margin-top: 12px;
  padding: 13px 14px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: linear-gradient(135deg, rgba(255,140,0,.05), rgba(255,140,0,.01));
}
.preset-card-icon {
  flex-shrink: 0;
  width: 32px; height: 32px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  background: rgba(255,140,0,.12);
  color: #ff8c00;
  font-size: 1rem;
}
.preset-card-body {
  flex: 1;
  min-width: 0;
}
.preset-card-title {
  font-family: var(--mono);
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 3px;
}
.preset-card-desc {
  font-size: 0.74rem;
  color: var(--muted);
  line-height: 1.6;
  margin-bottom: 10px;
}
.preset-card-controls {
  display: flex;
  gap: 8px;
}
.preset-select {
  width: auto;
  flex-shrink: 0;
  font-size: 0.74rem;
  padding: 7px 10px;
}
.preset-btn {
  flex: 1;
  font-family: var(--mono);
  font-size: 0.76rem;
  font-weight: 600;
  padding: 7px 14px;
  border-radius: 6px;
  border: 1px solid #ff8c00;
  background: rgba(255,140,0,.1);
  color: #ff8c00;
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
}
.preset-btn:hover {
  background: rgba(255,140,0,.18);
}
.preset-card-result {
  font-family: var(--mono);
  font-size: 0.7rem;
  color: var(--accent);
  margin-top: 8px;
  min-height: 1.2em;
}

.hidden { display: none; }

/* cursor blink */
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
.cursor { animation: blink 1s infinite; color: var(--accent); }

</style>
</head>
<body>

<div style="max-width:1400px;margin:0 auto;">

  <!-- header -->
  <div class="header">
    <div class="header-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="12" r="3" fill="currentColor"/>
        <path d="M12 2V6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
        <path d="M12 18V22" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
        <path d="M2 12H6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
        <path d="M18 12H22" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
        <circle cx="12" cy="12" r="8" stroke="currentColor" stroke-width="1.6" stroke-dasharray="2.5 3.5" opacity="0.65"/>
      </svg>
    </div>
    <div>
      <h1>IP_SCANNER<span class="sub-brand">_LABS</span></h1>
      <p data-i18n="headerTagline"></p>
    </div>
    <div class="lang-switch" id="lang-switch">
      <button class="lang-trigger" id="lang-trigger" onclick="toggleLangMenu()" aria-label="Change language">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.6"/>
          <path d="M3 12H21" stroke="currentColor" stroke-width="1.6"/>
          <path d="M12 3C14.5 5.7 15.8 8.8 15.8 12C15.8 15.2 14.5 18.3 12 21C9.5 18.3 8.2 15.2 8.2 12C8.2 8.8 9.5 5.7 12 3Z" stroke="currentColor" stroke-width="1.6"/>
        </svg>
      </button>
      <div class="lang-menu" id="lang-menu">
        <button id="lang-fa" onclick="setLanguage('fa')">فارسی</button>
        <button id="lang-en" onclick="setLanguage('en')">English</button>
      </div>
    </div>
  </div>

  <div class="main-layout">

  <!-- full-width notice spanning both columns on desktop -->
  <div class="usage-notice layout-span">

// ── IP parsing ──
// Top-level: split on commas and/or whitespace → each piece can be a single IP / range / CIDR
function parseTargets(raw) {
  raw = raw.trim();
  if (!raw) return [];
  const pieces = raw.split(/[,\s]+/).map(p => p.trim()).filter(Boolean);
  let all = [];
  for (const piece of pieces) {
    if (piece.includes('/')) all = all.concat(parseCIDR(piece));
    else if (piece.includes('-')) all = all.concat(parseRange(piece));
    else all.push(piece);
  }
  // dedupe while preserving order
  return [...new Set(all)];
}

function parseCIDR(cidr) {
  const [base, prefix] = cidr.split('/');
  const bits = parseInt(prefix);
  if (isNaN(bits) || bits < 0 || bits > 32) return [];
  const parts = base.split('.').map(Number);
  if (parts.length !== 4) return [];
  const baseInt = parts.reduce((acc, v, i) => acc | (v << (24 - i*8)), 0) >>> 0;
  const mask = bits === 0 ? 0 : (~0 << (32 - bits)) >>> 0;
  const net  = (baseInt & mask) >>> 0;
  const count = Math.pow(2, 32 - bits);
  if (count > 1024) { alert(t('alertRangeTooLarge')); return []; }
  const ips = [];
  for (let i = 1; i < count - 1; i++) {
    const ip = net + i;
    ips.push([(ip>>>24)&255,(ip>>>16)&255,(ip>>>8)&255,ip&255].join('.'));
  }
  return ips;
}

function parseRange(s) {
  // 192.168.1.1-254  or  192.168.1.1-192.168.1.254
  const dashIdx = s.lastIndexOf('-');
  const left  = s.substring(0, dashIdx);
  const right = s.substring(dashIdx + 1);
  const leftParts = left.split('.').map(Number);
  if (leftParts.length !== 4) return [];
  if (right.includes('.')) {
    const rightParts = right.split('.').map(Number);
    const start = leftParts[3], end = rightParts[3];
    const ips = [];
    for (let i = start; i <= end; i++)
      ips.push([leftParts[0],leftParts[1],leftParts[2],i].join('.'));
    return ips;
  } else {
    const start = leftParts[3], end = parseInt(right);
    const ips = [];
    for (let i = start; i <= end; i++)
      ips.push([leftParts[0],leftParts[1],leftParts[2],i].join('.'));
    return ips;
  }
}

  const info = document.getElementById('range-info');
  if (targets.length > 1) info.textContent = t('rangeInfoMultiple', targets.length);
  else if (targets.length === 1) info.textContent = t('rangeInfoSingle');
  else info.textContent = t('rangeInfoEmpty');
}

// ── Cloudflare clean-IP preset ──
// Official IPv4 ranges published at https://www.cloudflare.com/ips-v4/
// (fetched manually; Cloudflare's ranges change infrequently, but verify
// against the official page if this list is more than a few months old)
const CLOUDFLARE_IPV4_BLOCKS = [
  '173.245.48.0/20',
  '103.21.244.0/22',
  '103.22.200.0/22',
  '103.31.4.0/22',
  '141.101.64.0/18',
  '108.162.192.0/18',
  '190.93.240.0/20',
  '188.114.96.0/20',
  '197.234.240.0/22',
  '198.41.128.0/17',
  '162.158.0.0/15',
  '104.16.0.0/13',
  '104.24.0.0/14',
  '172.64.0.0/13',
  '131.0.72.0/22',
];

// Cloudflare's ranges are far too large to scan in full (over 1.5 million
// addresses combined), so this draws a random sample from each block rather
// than scanning sequentially. Sequential scanning would also concentrate
// load on the first few addresses of each block, which isn't representative.
function sampleCIDR(cidr, count) {
  const [base, prefix] = cidr.split('/');
  const bits = parseInt(prefix);
  const parts = base.split('.').map(Number);
  const baseInt = parts.reduce((acc, v, i) => acc | (v << (24 - i*8)), 0) >>> 0;
  const hostBits = 32 - bits;
  const blockSize = Math.pow(2, hostBits);
  const usable = Math.max(blockSize - 2, 1); // exclude network/broadcast where applicable

  const offsets = new Set();
  const want = Math.min(count, usable);
  while (offsets.size < want) {
    offsets.add(1 + Math.floor(Math.random() * usable));
  }

  return [...offsets].map(off => {
    const ip = (baseInt + off) >>> 0;
    return [(ip>>>24)&255, (ip>>>16)&255, (ip>>>8)&255, ip&255].join('.');
  });
}

function loadCloudflarePreset() {
  const perBlock = parseInt(document.getElementById('preset-sample-size').value) || 20;
  let sampled = [];
  for (const block of CLOUDFLARE_IPV4_BLOCKS) {
    sampled = sampled.concat(sampleCIDR(block, perBlock));
  }
  document.getElementById('target').value = sampled.join(', ');
  updateRangeInfo();
  document.getElementById('preset-info').textContent =
    t('presetLoaded', sampled.length, CLOUDFLARE_IPV4_BLOCKS.length);
}

// ── browser probe (simulated TCP via fetch) ──
async function probeHTTP(ip, port, timeout) {
  const t = parseInt(timeout) || 1000;
  const start = Date.now();
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), t);
  try {
    await fetch(`http://${ip}:${port}`, { mode: 'no-cors', signal: ctrl.signal });
    clearTimeout(timer);
    return { alive: true, latency: Date.now() - start };
  } catch (e) {
    clearTimeout(timer);
    const lat = Date.now() - start;
    if (e.name === 'AbortError') return { alive: false, latency: t };
    // NOTE: a no-cors fetch resolves as an opaque response on most failure
    // paths too, so this is a heuristic, not a guarantee the port is open.
    return { alive: true, latency: lat };
  }
}

// robust clipboard helper: tries the modern API, falls back to execCommand
// for contexts where navigator.clipboard is unavailable or blocked
// (insecure origin, old WebView, missing permission, etc.)
async function copyToClipboard(text) {
  if (navigator.clipboard && window.isSecureContext) {
    try {
      await navigator.clipboard.writeText(text);
      return true;
    } catch (e) {
      // fall through to legacy method
    }
  }
  try {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    ta.style.top = '0';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    const ok = document.execCommand('copy');
    document.body.removeChild(ta);
    return ok;
  } catch (e) {
    return false;
  }
}

function copyIP(ip, btn) {
  copyToClipboard(ip).then(ok => {
    const original = btn.textContent;
    btn.textContent = ok ? t('copyIPOK') : t('copyIPFail');
    setTimeout(() => { btn.textContent = original; }, 900);
  });
}

// ── main scan ──
async function startScan() {
  const targetRaw = document.getElementById('target').value.trim();
  const timeout   = parseInt(document.getElementById('timeout').value) || 1000;
  const concurrency = parseInt(document.getElementById('concurrency').value) || 50;
  const mode = document.getElementById('mode').value;

  if (!targetRaw) { alert(t('alertNoTarget')); return; }

  const targets = parseTargets(targetRaw);
  if (!targets.length) return;

  if (mode === 'python') {
    showPythonCode(targetRaw, timeout, concurrency);
    return;
  }

  const ports = document.getElementById('custom-ports').value
    .split(',').map(v => v.trim()).filter(Boolean).map(Number).filter(n => n > 0);
  if (currentMethod !== 'icmp' && !ports.length) { alert(t('alertNoPort')); return; }

  // setup UI
  scanning = true;
  stopRequested = false;
  scanResults = [];
  document.getElementById('scan-btn').disabled = true;
  document.getElementById('scan-btn').textContent = t('btnScanning');
  document.getElementById('stop-btn').style.display = 'block';
  document.getElementById('stop-btn').disabled = false;
  document.getElementById('stop-btn').textContent = t('btnStop');
  document.getElementById('progress-card').style.display = 'block';
  document.getElementById('log-card').style.display = 'block';
  document.getElementById('results-card').style.display = 'block';
  document.getElementById('python-card').style.display = 'none';
  document.getElementById('welcome-card').style.display = 'none';
  document.getElementById('results-body').innerHTML = '';
  clearLog();

  log(t('logStart', targets.length, currentMethod), 'log-info');
  if (currentMethod !== 'icmp')
    log(t('logPorts', ports.join(', ')), 'log-info');

  // track per-IP completion for the "host X of Y" progress text
  let ipsDone = 0;
  const totalIPs = targets.length;
  const ipTaskCount = {};   // ip -> remaining tasks
  const ipCompletedSet = new Set();

  document.getElementById('s-total').textContent = totalIPs;
  document.getElementById('s-alive').textContent = 0;
  document.getElementById('s-dead').textContent  = 0;
  document.getElementById('progress-text').textContent = t('progressOf', 0, totalIPs);

  startTime = Date.now();
  timerInterval = setInterval(() => {
    document.getElementById('s-time').textContent = ((Date.now()-startTime)/1000).toFixed(1)+'s';
  }, 200);

  // build task list
  const tasks = [];
  for (const ip of targets) {
    let count = 0;
    if (currentMethod === 'icmp') {
      tasks.push({ ip, port: null, method: 'icmp' });
      count = 1;
    } else if (currentMethod === 'tcp') {
      for (const port of ports) tasks.push({ ip, port, method: 'tcp' });
      count = ports.length;
    } else {
      tasks.push({ ip, port: null, method: 'icmp' });
      for (const port of ports) tasks.push({ ip, port, method: 'tcp' });
      count = ports.length + 1;
    }
    ipTaskCount[ip] = count;
  }

  let doneTasks = 0, aliveIPs = 0, deadIPs = 0;
  const ipAliveSeen = new Set();

  async function runTask(task) {
    let result;
    if (task.method === 'icmp') {
      result = await probeHTTP(task.ip, 80, timeout);
      result.method = 'ICMP (sim)';
    } else {
      result = await probeHTTP(task.ip, task.port, timeout);
      result.method = `TCP:${task.port}`;
    }
    result.ip   = task.ip;
    result.port = task.port;
    scanResults.push(result);

    if (result.alive && !ipAliveSeen.has(task.ip)) {
      ipAliveSeen.add(task.ip);
      log(t('logAlive', task.ip, result.latency, result.method), 'log-ok');
    }

    doneTasks++;
    ipTaskCount[task.ip]--;
    if (ipTaskCount[task.ip] === 0 && !ipCompletedSet.has(task.ip)) {
      ipCompletedSet.add(task.ip);
      ipsDone++;
      if (ipAliveSeen.has(task.ip)) aliveIPs++; else deadIPs++;
      document.getElementById('progress-text').textContent =
        t('progressChecking', ipsDone, totalIPs, task.ip);
    }

    const pct = Math.round(doneTasks / tasks.length * 100);
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('s-alive').textContent = aliveIPs;
    document.getElementById('s-dead').textContent  = deadIPs;

    renderResults(); // live update (filtered/sorted/deduped)
  }

  // concurrency pool
  let idx = 0;
  async function worker() {
    while (idx < tasks.length) {
      if (stopRequested) break;
      const task = tasks[idx++];
      await runTask(task);
    }
  }
  const workers = Array.from({ length: Math.min(concurrency, tasks.length) }, () => worker());
  await Promise.all(workers);

  clearInterval(timerInterval);
  const elapsed = ((Date.now()-startTime)/1000).toFixed(1);
  if (stopRequested) {
    document.getElementById('progress-text').textContent = t('progressStopped', ipsDone, totalIPs);
    log(t('logStopped', aliveIPs, ipsDone, elapsed), 'log-warn');
  } else {
    document.getElementById('progress-text').textContent = t('progressDone', totalIPs);
    log(t('logDone', aliveIPs, totalIPs, elapsed), 'log-warn');
  }

  document.getElementById('results-card').style.display = 'block';
  renderResults();

  document.getElementById('scan-btn').disabled = false;
  document.getElementById('scan-btn').textContent = t('btnRescan');
  document.getElementById('stop-btn').style.display = 'none';
  scanning = false;
}

function stopScan() {
  if (!scanning) return;
  stopRequested = true;
  document.getElementById('stop-btn').disabled = true;
  document.getElementById('stop-btn').textContent = t('btnStopping');
  // worker loops check the flag between tasks; once all in-flight probes
  // resolve, startScan's tail code hides this button and resets scan-btn
}

// ── render results: dedupe by IP, apply filter + sort, respect detail toggle ──
function collapseByIP() {
  const byIP = new Map();
  for (const r of scanResults) {
    const existing = byIP.get(r.ip);
    if (!existing) {
      byIP.set(r.ip, {
        ip: r.ip,
        alive: r.alive,
        latency: r.latency,
        port: r.port,
        method: r.method,
        // every successful probe for this IP, kept for the detail view
        openPorts: r.alive ? [{ port: r.port, method: r.method, latency: r.latency }] : []
      });
    } else {
      if (r.alive) {
        existing.openPorts.push({ port: r.port, method: r.method, latency: r.latency });
        // the headline port/latency shown in simple mode is always the fastest one
        if (!existing.alive || r.latency < existing.latency) {
          existing.alive = true;
          existing.latency = r.latency;
          existing.port = r.port;
          existing.method = r.method;
        }
      } else if (!existing.alive) {
        existing.latency = Math.max(existing.latency, r.latency);
      }
    }
  }
  // keep each IP's open-port list sorted fastest-first for a stable detail view
  for (const row of byIP.values()) {
    row.openPorts.sort((a, b) => a.latency - b.latency);
  }
  return [...byIP.values()];
}

function applyFilterAndSort(rows) {
  if (currentFilter === 'alive') rows = rows.filter(r => r.alive);
  else if (currentFilter === 'dead') rows = rows.filter(r => !r.alive);
  if (sortFastest) {
    rows = [...rows].sort((a, b) => {
      if (a.alive !== b.alive) return a.alive ? -1 : 1;
      return a.latency - b.latency;
    });
  }
  return rows;
}

function renderResults() {
  const rows = applyFilterAndSort(collapseByIP());

  const tbody = document.getElementById('results-body');
  tbody.innerHTML = '';
  rows.forEach((r, i) => {
    const tr = document.createElement('tr');
    const statusBadge = r.alive
      ? `<span class="badge badge-ok">${t('statusAlive')}</span>`
      : `<span class="badge badge-fail">${t('statusDead')}</span>`;

    // detail mode: list every open port for this IP, not just the fastest one
    const portCell = r.openPorts.length
      ? r.openPorts.map(p => p.port).join(', ')
      : (r.port || '—');
    const methodCell = r.openPorts.length
      ? r.openPorts.map(p => p.method).join(', ')
      : (r.method || '—');

    tr.innerHTML = `
      <td class="row-num">${i + 1}</td>
      <td class="ip-cell ip-copy" onclick="copyIP('${r.ip}', this)">${r.ip}</td>
      <td class="detail-col${showDetail ? ' show' : ''}">${portCell}</td>
      <td class="detail-col${showDetail ? ' show' : ''}" style="color:var(--muted)">${methodCell}</td>
      <td class="latency-cell">${r.alive ? r.latency + 'ms' : '—'}</td>
      <td>${statusBadge}</td>
    `;
    tr.querySelector('.ip-copy').title = t('copyHint');
    tbody.appendChild(tr);
  });

  document.getElementById('no-results').style.display = rows.length ? 'none' : 'block';

  if (autoScroll) {
    const wrap = document.querySelector('.results-wrap');
    if (wrap) wrap.scrollTop = wrap.scrollHeight;
  }
}

// helper: get the deduped/filtered/sorted row set used for export
function getDisplayedRows() {
  return applyFilterAndSort(collapseByIP());
}

// formats one detail-mode line for an IP, listing every open port found
function formatDetailLine(r) {
  if (!r.alive) return `${r.ip}  NO_RESPONSE`;
  const ports = r.openPorts.length
    ? r.openPorts.map(p => `${p.port}(${p.latency}ms)`).join(', ')
    : `${r.port || '-'} (${r.latency}ms)`;
  return `${r.ip}  [${ports}]  ALIVE`;
}

  } else {

    });

  });
}

// generates e.g. "20260620_101245" so every export filename stays unique
function timestampTag() {
  const d = new Date();
  const p = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}_${p(d.getHours())}${p(d.getMinutes())}${p(d.getSeconds())}`;
}

function download(name, content, type) {
  // insert a timestamp before the extension so repeated exports never overwrite each other
  const dotIdx = name.lastIndexOf('.');
  const base = dotIdx !== -1 ? name.slice(0, dotIdx) : name;
  const ext  = dotIdx !== -1 ? name.slice(dotIdx) : '';
  const uniqueName = `${base}_${timestampTag()}${ext}`;

  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content], { type }));
  a.download = uniqueName;
  a.click();
}

// ── Python code generator ──
function showPythonCode(target, timeout, concurrency) {
  const ports = document.getElementById('custom-ports').value || '80,443,22,8080,8443';
  const method = currentMethod;

  const code = `#!/usr/bin/env python3
"""
IP Scanner Labs — accurate scan, no root required.
Method: ${method === 'icmp' ? 'ICMP Ping' : method === 'tcp' ? 'TCP Connect' : 'ICMP + TCP'}
Generated by IP Scanner Labs.
Supports multiple targets separated by commas or spaces, e.g.:
"109.85.76.1, 46.86.78.0/24 192.168.1.1-254"
"""

import socket
import subprocess
import platform
import ipaddress
import re
import concurrent.futures
import csv
import json
import time
from datetime import datetime

# ── configuration ─────────────────────────────────
TARGET     = "${target}"
PORTS      = [${method !== 'icmp' ? ports : '80'}]   # ports to probe
TIMEOUT    = ${timeout / 1000}        # seconds
WORKERS    = ${concurrency}         # concurrent threads
METHOD     = "${method}"            # tcp | icmp | both
# ───────────────────────────────────────────────────


def parse_single(raw: str) -> list:
    """Expand one IP / CIDR / range token into a list of IPs."""
    raw = raw.strip()
    if '/' in raw:
        net = ipaddress.IPv4Network(raw, strict=False)
        return [str(h) for h in net.hosts()]
    if '-' in raw:
        parts = raw.split('-')
        base  = parts[0].rsplit('.', 1)
        start = int(base[1])
        end   = int(parts[1]) if '.' not in parts[1] else int(parts[1].split('.')[-1])
        prefix = base[0]
        return [f"{prefix}.{i}" for i in range(start, end + 1)]
    return [raw]


def parse_targets(raw: str) -> list:
    """Support multiple targets separated by commas and/or whitespace; deduped."""
    pieces = [p for p in re.split(r'[,\\s]+', raw.strip()) if p]
    seen = []
    for piece in pieces:
        for ip in parse_single(piece):
            if ip not in seen:
                seen.append(ip)
    return seen


def tcp_probe(ip: str, port: int) -> dict:
    """TCP connect probe — does not require root."""
    start = time.time()
    try:
        sock = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
        sock.settimeout(TIMEOUT)
        result = sock.connect_ex((ip, port))
        sock.close()
        latency = int((time.time() - start) * 1000)
        alive = result == 0
        return {"ip": ip, "port": port, "method": f"TCP:{port}",
                "alive": alive, "latency_ms": latency}
    except Exception as e:
        return {"ip": ip, "port": port, "method": f"TCP:{port}",
                "alive": False, "latency_ms": -1, "error": str(e)}


def icmp_probe(ip: str) -> dict:
    """ICMP ping via the system's ping binary — does not require root."""
    start = time.time()
    param = ["-n", "1", "-w", str(int(TIMEOUT * 1000))] \\
            if platform.system().lower() == "windows" \\
            else ["-c", "1", "-W", str(int(TIMEOUT))]
    try:
        result = subprocess.run(
            ["ping"] + param + [ip],
            stdout=subprocess.PIPE,
            stderr=subprocess.PIPE
        )
        latency = int((time.time() - start) * 1000)
        alive = result.returncode == 0
        return {"ip": ip, "port": None, "method": "ICMP",
                "alive": alive, "latency_ms": latency}
    except FileNotFoundError:
        return {"ip": ip, "port": None, "method": "ICMP",
                "alive": False, "latency_ms": -1, "error": "ping not found"}


def scan_host(task: tuple) -> dict:
    ip, port, method = task
    if method == "icmp":
        return icmp_probe(ip)
    return tcp_probe(ip, port)


def main():
    targets = parse_targets(TARGET)
    total_ips = len(targets)
    print(f"[*] Scanning {total_ips} unique address(es) — method: {METHOD}")

    tasks = []
    if METHOD in ("tcp", "both"):
        for ip in targets:
            for port in PORTS:
                tasks.append((ip, port, "tcp"))
    if METHOD in ("icmp", "both"):
        for ip in targets:
            tasks.append((ip, None, "icmp"))

    print(f"[*] Total tasks: {len(tasks)}")

    results = []
    alive_ips = {}     # ip -> best (fastest alive) result
    ip_remaining = {}
    for ip in targets:
        ip_remaining[ip] = sum(1 for task in tasks if task[0] == ip)

    ips_done = 0
    start_time = time.time()

    with concurrent.futures.ThreadPoolExecutor(max_workers=WORKERS) as executor:
        futures = {executor.submit(scan_host, task): task for task in tasks}
        for future in concurrent.futures.as_completed(futures):
            r = future.result()
            results.append(r)

            if r["alive"]:
                current = alive_ips.get(r["ip"])
                if current is None or r["latency_ms"] < current["latency_ms"]:
                    alive_ips[r["ip"]] = r

            ip_remaining[r["ip"]] -= 1
            if ip_remaining[r["ip"]] == 0:
                ips_done += 1
                status = "alive" if r["ip"] in alive_ips else "no response"
                print(f"  Host {ips_done} of {total_ips}  —  {r['ip']}  —  {status}")

    elapsed = time.time() - start_time
    print(f"\\n[done] Scan complete — {len(alive_ips)} of {total_ips} hosts alive — {elapsed:.1f}s")

    sorted_alive = sorted(alive_ips.values(), key=lambda x: x["latency_ms"])

    timestamp = datetime.now().strftime("%Y%m%d_%H%M%S")

    # txt: unique alive IPs only, no port info
    with open(f"scan_{timestamp}.txt", "w") as f:
        for r in sorted_alive:
            f.write(r["ip"] + "\\n")

    with open(f"scan_{timestamp}.csv", "w", newline="") as f:
        writer = csv.DictWriter(f, fieldnames=["ip","port","method","alive","latency_ms"])
        writer.writeheader()
        writer.writerows(results)

    with open(f"scan_{timestamp}.json", "w") as f:
        json.dump(sorted_alive, f, indent=2)

    print(f"[*] Results saved: scan_{timestamp}.txt / .csv / .json")
    print("\\n── Alive hosts (fastest first) ──────────────")
    for r in sorted_alive:
        print(f"  {r['ip']:20s} {r['latency_ms']}ms")


if __name__ == "__main__":
    main()
`;

  document.getElementById('python-card').style.display = 'block';
  document.getElementById('log-card').style.display = 'none';
  document.getElementById('progress-card').style.display = 'none';
  document.getElementById('welcome-card').style.display = 'none';
  document.getElementById('python-code').textContent = code;
  document.getElementById('python-card').scrollIntoView({ behavior: 'smooth' });
}

  copyToClipboard(document.getElementById('python-code').textContent).then(ok => {
    alert(ok ? t('copyOK') : t('copyFail'));
  });
}
function downloadPython() {
  download('ip_scanner.py', document.getElementById('python-code').textContent, 'text/plain');
}

  ['target', 'custom-ports', 'timeout', 'concurrency'].forEach(id => {

      if (e.key === 'Enter' && !scanning) startScan();
    });
  });

  document.getElementById('footer-year').textContent = new Date().getFullYear();

  document.addEventListener('click', (e) => {

  applyLanguage();
